name: Build

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
          - name: Windows x86_64
            os: windows-2025
            target: x86_64-pc-windows-msvc
          - name: Linux x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install stable Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang \
            cmake \
            g++ \
            libasound2-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            lld \
            pkg-config

      - name: Build workspace
        run: cargo build --workspace --locked --target "${{ matrix.target }}"

      - name: Test Windows config file synchronization
        if: runner.os == 'Windows'
        run: cargo test --locked --target "${{ matrix.target }}" -p yttt --lib std_layout_file_system_syncs_with_a_writable_handle

      - name: Verify Windows executable resources
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/verify-windows-binary.ps1 -Binary "target/${{ matrix.target }}/debug/yttt.exe"

